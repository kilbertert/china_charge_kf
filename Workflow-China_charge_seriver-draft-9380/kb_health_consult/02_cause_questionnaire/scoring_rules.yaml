# 02 成因量表库 — 扩展：评分规则 + code_key 对齐

## 问卷定义（含 code_key 别名）

每个 question 的 `code_key` 字段对齐 Python 代码中 `_score_semantic_answers()` 使用的变量名。
问卷 YAML 负责定义"问什么"，本文件负责定义"答案怎么映射到风险标签"。

### 通用筛查题

```yaml
general_screening:
  - id: q_age
    code_key: age_range
    text: 您的年龄段是?
    type: single_select
    options:
      - key: u40
        label: 40岁以下
      - key: 40_50
        label: 40-50岁
      - key: 50_60
        label: 50-60岁
      - key: o60
        label: 60岁以上

  - id: q_gender
    code_key: sex
    text: 您的性别是?
    type: single_select
    options:
      - key: female
        label: 女
      - key: male
        label: 男
```

### 骨密度专项题

```yaml
bone_density_specific:
  - id: q_supplement_frequency
    code_key: supplement_frequency
    text: 您日常补充钙或维生素D的频率是?
    type: single_select
    options:
      - key: daily
        label: 几乎每天补充
      - key: sometimes
        label: 偶尔补充
      - key: rarely
        label: 几乎不补充
      - key: never
        label: 从不补充

  - id: q_outdoor_exercise_duration
    code_key: outdoor_exercise_duration
    text: 您每周累计户外运动/日晒的时长大概是?
    type: single_select
    options:
      - key: less1
        label: 不足1小时
      - key: "1to3"
        label: 1-3小时
      - key: more3
        label: 3小时以上
      - key: none
        label: 几乎不出门

  - id: q_medication_history
    code_key: medication_history
    text: 您是否有长期服用影响骨代谢的相关药物史?
    type: single_select
    options:
      - key: yes
        label: 是
      - key: no
        label: 否
      - key: unknown
        label: 不清楚

  - id: q_menopause
    code_key: menopause
    text: 您是否已绝经?
    type: yes_no
    skip_when:
      - sex == "male"
      - age_range in ["u40"]
      - t_value_all_normal  # 所有 T 值 > -1.0 时跳过

  - id: q_fragility_fracture
    code_key: fragility_fracture
    text: 您或您的直系亲属是否有过轻微摔倒后骨折?
    type: yes_no

  - id: q_family_osteoporosis
    code_key: family_osteoporosis
    text: 您的直系亲属中是否有人确诊过骨质疏松?
    type: yes_no

  - id: q_sun_exposure
    code_key: sun_exposure
    text: 您平均每天日晒时间?
    type: single_select
    options:
      - key: lt_15min
        label: 少于15分钟
      - key: "15_30min"
        label: 15-30分钟
      - key: gt_30min
        label: 多于30分钟

  - id: q_calcium_intake
    code_key: calcium_intake
    text: 您每天喝牛奶或吃奶制品的量?
    type: single_select
    options:
      - key: none
        label: 基本不喝
      - key: low
        label: 偶尔少量
      - key: medium
        label: 每天约200ml
      - key: high
        label: 每天500ml以上

  - id: q_strength_training
    code_key: strength_training
    text: 您是否进行规律的力量训练或抗阻运动?
    type: yes_no

  - id: q_steroid_use
    code_key: steroid_use
    text: 您是否长期使用糖皮质激素(如泼尼松)?
    type: yes_no

  - id: q_chronic_disease
    code_key: chronic_disease
    text: 您是否确诊过以下慢性病?
    type: multi_select
    options:
      - key: diabetes
        label: 糖尿病
      - key: thyroid
        label: 甲状腺疾病
      - key: kidney
        label: 慢性肾病
      - key: liver
        label: 慢性肝病
      - key: none
        label: 都没有

  - id: q_spine_symptom
    code_key: spine_symptom
    text: 您是否有腰背痛、身高变矮或驼背加重的表现?
    type: yes_no

  - id: q_vitd_tested
    code_key: vitd_tested
    text: 您是否检查过 25-OH 维生素D? 结果如何?
    type: single_select
    options:
      - key: normal
        label: 正常/充足
      - key: low
        label: 偏低/缺乏
      - key: not_tested
        label: 未检查

  - id: q_low_bmi
    code_key: low_bmi
    text: 您是否体重偏低(BMI < 18.5)或近期明显减重?
    type: yes_no
```

### 通用危险信号筛查题

```yaml
danger_signals:
  - id: q_sudden_severe
    code_key: sudden_severe
    text: 是否突然发生且疼得很厉害?
    type: yes_no

  - id: q_cannot_stand
    code_key: cannot_stand
    text: 现在是否影响站立、走路或负重?
    type: yes_no

  - id: q_chest_discomfort
    code_key: chest_discomfort
    text: 是否伴有胸闷、心慌或呼吸困难?
    type: yes_no

  - id: q_fever_red_swollen
    code_key: fever_red_swollen
    text: 是否伴有发热、寒战或局部红肿热痛?
    type: yes_no

  - id: q_weakness_numbness
    code_key: weakness_numbness
    text: 是否伴有麻木、无力或放射感?
    type: yes_no

  - id: q_trauma
    code_key: trauma
    text: 是否因外伤导致的疼痛或活动受限?
    type: yes_no
```

