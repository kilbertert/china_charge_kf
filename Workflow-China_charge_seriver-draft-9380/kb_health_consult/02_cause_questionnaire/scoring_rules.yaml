## 标签优先级与风险等级映射

```yaml
tag_priority:        # 从高到低排序，同分时按此顺序取最高优先级
  - fracture_high_risk       # weight 高 + 临床后果严重
  - medication_related       # 药物影响需优先处理
  - menopause_related        # 激素因素
  - vitamin_d_deficient      # 可干预的营养因素
  - calcium_protein_deficient
  - exercise_deficient

tag_risk_level:
  fracture_high_risk:       high
  medication_related:       high
  menopause_related:        medium
  vitamin_d_deficient:      medium
  calcium_protein_deficient: low
  exercise_deficient:       low

# 置信度计算参数
confidence:
  base: 0.72
  per_weight_point: 0.05
  max: 0.95
  insufficient_threshold: 0.7  # confidence < 此值 → insufficient_data
```

