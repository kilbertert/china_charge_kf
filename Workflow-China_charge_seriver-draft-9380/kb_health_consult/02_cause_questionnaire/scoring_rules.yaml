## 评分规则：固定答案 → 风险标签 + 权重

每个 question 的特定 answer 映射到 tag 和 weight。

```yaml
fixed_answer_scoring:
  menopause:
    yes:
      - tag: menopause_related
        weight: 3
        evidence: "已绝经"

  fragility_fracture:
    yes:
      - tag: fracture_high_risk
        weight: 3
        evidence: "有轻微摔倒后骨折史"

  family_osteoporosis:
    yes:
      - tag: fracture_high_risk
        weight: 2
        evidence: "有骨质疏松家族史"

  sun_exposure:
    lt_15min:
      - tag: vitamin_d_deficient
        weight: 2
        evidence: "日晒较少"
    "15_30min":
      - tag: vitamin_d_deficient
        weight: 1
        evidence: "日晒一般"

  calcium_intake:
    none:
      - tag: calcium_protein_deficient
        weight: 2
        evidence: "基本不喝奶制品"
    low:
      - tag: calcium_protein_deficient
        weight: 1
        evidence: "奶制品摄入偏低"

  strength_training:
    no:
      - tag: exercise_deficient
        weight: 2
        evidence: "缺乏负重或力量训练"

  steroid_use:
    yes:
      - tag: medication_related
        weight: 3
        evidence: "长期服用激素类药物"

  smoke_alcohol:          # 注：问卷中未直接设题，保留用于扩展
    yes:
      - tag: medication_related
        weight: 1
        evidence: "经常饮酒或吸烟"

  chronic_disease:
    yes:
      - tag: medication_related
        weight: 2
        evidence: "存在影响骨代谢的慢病"

  spine_symptom:
    yes:
      - tag: fracture_high_risk
        weight: 3
        evidence: "有腰背痛/身高变矮/驼背加重表现"

  vitd_tested:
    low:
      - tag: vitamin_d_deficient
        weight: 2
        evidence: "25-OH 维生素D检查偏低"

  low_bmi:
    yes:
      - tag: calcium_protein_deficient
        weight: 1
        evidence: "体重偏低或近期明显减重"
```

