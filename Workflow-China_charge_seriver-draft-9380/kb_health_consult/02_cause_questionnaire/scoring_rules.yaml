## 评分规则：语义答案 → 风险标签 + 权重

基于通用筛查题（age_range, sex, supplement_frequency 等）的语义推断。

```yaml
semantic_scoring:
  sex_female_and_age:
    conditions:
      - sex == "female" AND age_range in ["50_60", "o60"]
        tag: menopause_related
        weight: 3
        evidence: "女性且年龄位于绝经相关高发区间"
      - sex == "female" AND age_range == "40_50"
        tag: menopause_related
        weight: 1
        evidence: "女性且接近绝经年龄段"

  supplement_frequency:
    conditions:
      - value == "rarely"
        tag: calcium_protein_deficient
        weight: 2
        evidence: "日常很少补充钙或维生素D"
      - value == "rarely"
        tag: vitamin_d_deficient
        weight: 2
        evidence: "日常很少补充钙或维生素D"
      - value == "sometimes"
        tag: calcium_protein_deficient
        weight: 1
        evidence: "钙和维生素D补充频率偏低"
      - value == "sometimes"
        tag: vitamin_d_deficient
        weight: 1
        evidence: "钙和维生素D补充频率偏低"

  outdoor_exercise_duration:
    conditions:
      - value == "less1"
        tag: exercise_deficient
        weight: 2
        evidence: "户外运动时长不足"
        also_add:
          - tag: vitamin_d_deficient
            weight: 1
            evidence: "户外运动少，日晒不足"
      - value == "1to3"
        tag: exercise_deficient
        weight: 1
        evidence: "户外运动一般"

  medication_history:
    conditions:
      - value == "yes"
        tag: medication_related
        weight: 3
        evidence: "存在长期影响骨代谢的用药史"

  age_only:
    conditions:
      - value == "o60"
        tag: fracture_high_risk
        weight: 1
        evidence: "年龄较大，骨折风险相对更高"
```

