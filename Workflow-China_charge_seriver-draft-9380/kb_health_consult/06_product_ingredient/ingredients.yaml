# 06 产品原料库 — 健康产品常见原料与避坑
核心原料(主流健康产品):
  钙剂:
    类型: 矿物钙/有机钙
    常见原料:
      - 碳酸钙(便宜但吸收率低,需随餐)
      - 柠檬酸钙(吸收率高,空腹可服)
      - 乳酸钙
      - 葡萄糖酸钙
    适宜人群: 骨质疏松高风险/绝经后女性/老年人
    风险人群: 肾结石史/高血钙/甲状旁腺功能异常
    推荐摄入: 成人 1000-1200mg/天
    推荐时机: 随餐或分次服用

  维生素D:
    类型: 脂溶性维生素
    常见原料:
      - 维生素D3(胆钙化醇,推荐)
      - 维生素D2(麦角钙化醇)
    适宜人群: 阳光不足/老年人/孕妇
    风险人群: 高血钙/结节病/肾功能不全
    推荐摄入: 600-1000 IU/天(上限 4000 IU)
    推荐时机: 随餐(脂溶性吸收更好)

  氨糖:
    类型: 氨基葡萄糖
    常见原料:
      - 硫酸氨糖
      - 盐酸氨糖
    适宜人群: 膝关节退变/软骨磨损
    风险人群: 贝类过敏/糖尿病(可能影响血糖)
    推荐摄入: 1500mg/天
    注意事项: 需持续服用 8 周以上才显效

  软骨素:
    类型: 蛋白多糖
    常见原料: 鲨鱼/牛软骨提取
    适宜人群: 关节退变
    风险人群: 海鲜过敏/抗凝药使用者
    推荐摄入: 1200mg/天
    注意事项: 与氨糖合用效果更佳

  蛋白粉:
    类型: 动植物蛋白
    常见原料:
      - 乳清蛋白(吸收快)
      - 大豆蛋白(植物性)
      - 酪蛋白(缓释)
    适宜人群: 肌肉衰减/营养不良/老年人
    风险人群: 肾功能不全/乳糖不耐
    推荐摄入: 1.2-1.7g/kg/天(按体重)

  鱼油:
    类型: Omega-3 脂肪酸
    常见原料:
      - EPA(二十碳五烯酸)
      - DHA(二十二碳六烯酸)
    适宜人群: 心血管风险/高血脂/关节炎
    风险人群: 抗凝药使用者/海鲜过敏
    推荐摄入: EPA+DHA 250-500mg/天

已知的避坑项(常见夸大宣传):
  - pattern: "治愈"
    说明: 食品/营养品不得声称"治愈",仅能声称"有助于"
  - pattern: "排除"
    说明: 不得声称"排除体内毒素"等夸大宣传
  - pattern: "根治"
    说明: 慢性病均无法"根治",仅能控制
  - pattern: "代替药物"
    说明: 营养品不得声称"代替药物治疗"
  - pattern: "排出"
    说明: 营养品无法"排出体内废物"
  - pattern: "修复"
    说明: 已损组织无法"修复",仅能减缓
  - pattern: "调节"
    说明: 营养品仅能"辅助调节",不得替代药物

产品的客观评估模板(场景三 LLM 必用):
  template: |
    关于您咨询的 {{product_name}} 产品,本助手仅能基于客观信息协助判断:
    1. 产品/成分: {{ingredients}}
    2. 可能适合人群: {{suitable_for}}
    3. 需谨慎人群: {{caution_for}}
    4. 不能替代: 本助手无法推荐产品治疗或根治疾病
    选购前建议咨询专业医生或营养师。

错误话术拦截(场景三 LLM 严禁输出):
  - 治愈 {产品}
  - {产品} 可以排除毒素
  - {产品} 能根治 {疾病}
  - {产品} 可以代替药物
  - {产品} 修复 {组织}
  - {产品} 排出废物
  - 服用 {产品} 后一定能好
  - {产品} 包有效
  - 不需要看医生,吃 {产品} 就行

正确话术示例:
  - 钙片: 有助于维持骨骼健康,适合骨质疏松高风险人群
  - 维生素D: 有助于钙吸收,阳光不足者建议补充
  - 氨糖: 有助于关节软骨健康,需持续服用8周以上
  - 蛋白粉: 有助于补充蛋白质,适合营养不足人群
  - 鱼油: 有助于心血管健康,海鲜过敏者不建议
