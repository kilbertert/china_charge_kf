      - data:
          classes:
            - id: class_basic
              name: 基础功能或bug反馈(充电/计费/启动/支付等基础功能咨询,或任何bug/故障/报错反馈)
            - id: class_custom
              name: 定制功能(非基础的高级/定制功能咨询)
            - id: class_unclear
              name: 不清楚(无法判断)
            - id: class_out_of_domain
              name: 非充电桩相关问题(与充电桩/充电服务平台明显完全无关,如闲聊/天气/新闻/写代码/其他行业咨询/情感问题等)
          instruction: '基于语义理解,先做"流程1:是否清楚功能板块",再做"流程2:是否属于基础功能",给出唯一分类。


            **判定规则**:

            1. 用户模糊/太短/无法判断涉及哪个功能板块 → class_unclear

            2. 用户清楚表达了功能板块,且属于标准基础功能(计费/订单/设备/场地/用户/财务/报表等平台通用功能) → class_basic

            3. 用户问的是项目级/定制/增值/对接类功能(非标准基础功能,通常需产品或商务确认) → class_custom

            4. 不要用关键词匹配,要理解用户意图的语义

            5. 只能选一个分类

            6. 若用户问题与充电桩/充电服务平台明显完全无关(如闲聊/天气/新闻/写代码/其他行业咨询/情感问题) -> class_out_of_domain。注意:与充电/计费/设备/订单/场地等沾边的归
