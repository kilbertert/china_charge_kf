      - data:
          code: "def main(query: str, input_language: str) -> dict:\n    text = (query
            or \"\").strip()\n    if input_language and input_language.strip():\n\
            \        lang = input_language.strip()\n    else:\n        cjk = sum(1
            for c in text if '\\u4e00' <= c <= '\\u9fff')\n        # 泰文 0x0E00-0x0E7F;
            尼泊尔/天城文 0x0900-0x097F\n        thai = any(0x0E00 <= ord(c) <= 0x0E7F for
            c in text)\n        devanagari = any(0x0900 <= ord(c) <= 0x097F for c
            in text)\n        vi_chars = \"\\u0103\\u00e2\\u0111\\u00ea\\u00f4\\u01a1\\\
            u01b0\\u0102\\u00c2\\u0110\\u00ca\\u00d4\\u01a0\\u01af\"\n        vi_chars
            += \"\\u00e1\\u00e0\\u1ea3\\u00e3\\u1ea1\\u1eaf\\u1eb1\\u1eb3\\u1eb5\\\
            u1eb7\\u1ea5\\u1ea7\\u1ea9\\u1eab\\u1ead\"\n        vi_chars += \"\\u00e9\\\
            u00e8\\u1ebb\\u1ebd\\u1eb9\\u1ebf\\u1ec1\\u1ec3\\u1ec5\\u1ec7\\u00ed\\\
            u00ec\\u1ec9\\u00ee\\u1ecb\"\n        vi_chars += \"\\u00f3\\u00f2\\u1ecf\\\
            u00f5\\u1ecd\\u1ed1\\u1ed3\\u1ed5\\u1ed7\\u1ed9\\u1edb\\u1edd\\u1edf\\\
            u1ee1\\u1ee3\"\n        vi_chars += \"\\u00fa\\u00f9\\u1ee5\\u00fb\\u1ee7\\\
            u1ee9\\u1eeb\\u1eed\\u1eef\\u1ef1\\u00fd\\u1ef3\\u1ef5\\u1ef7\\u1ef9\"\
            \n        if thai:\n            lang = \"th\"\n        elif devanagari:\n\
            \            lang = \"ne\"\n        elif any(c in vi_chars for c in text):\n\
            \            lang = \"vi\"\n        elif cjk > 0:\n            lang =
            \"zh\"\n        else:\n            lang = \"en\"\n    return {\"query_text\"\
            : text, \"language\": lang}\n"
          code_language: python3
          outputs:
            language:
              children:
              type: string
            query_text:
