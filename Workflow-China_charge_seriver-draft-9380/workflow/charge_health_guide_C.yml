        targetPosition: left
        type: custom
        width: 242
      - data:
          title: code_准备输入
          type: code
          selected: false
          code: "def main(query: str, input_language: str, files: list) -> dict:\n    text = (query or '').strip()\n    if input_language and input_language.strip():\n        lang = input_language.strip()\n    else:\n        cjk = sum(1 for c in text if '一' <= c <= '鿿')\n        lang = 'zh' if cjk > 0 else 'en'\n    has_file = bool(files) and len(files) > 0\n    return {'query_text': text, 'language': lang, 'has_file': has_file}\n"
          code_language: python3
          outputs:
            query_text:
              children:
              type: string
            language:
              children:
              type: string
            has_file:
              children:
              type: boolean
          variables:
            - value_selector:
                - sys
                - query
              variable: query
            - value_selector:
                - '7001'
                - input_language
              variable: input_language
            - value_selector:
                - sys
                - files
              variable: files
        height: 120
        id: '7002'
        position:
          x: -480
          y: 0
        positionAbsolute:
          x: -480
          y: 0
        selected: false
        sourcePosition: right
        targetPosition: left
        type: custom
        width: 242
      - data:
          title: code_算轮次
          type: code
          selected: false
          code: "def main(cv_round: float) -> dict:\n    r = int(cv_round or 0) + 1\n    is_first = (r == 1)\n    stage = 'recommend' if r >= 5 else 'probe'\n    return {'round': r, 'is_first': is_first, 'round_stage': stage}\n"
          code_language: python3
          outputs:
            round:
              children:
              type: number
            is_first:
              children:
              type: boolean
            round_stage:
              children:
              type: string
          variables:
            - value_selector:
                - conversation
                - cv_round
              variable: cv_round
