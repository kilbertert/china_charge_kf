      - data:
          title: LLM_问诊
          type: llm
          selected: false
          model: *id001
          memory: *id002
          prompt_template:
            - id: sys7041
              role: system
              text: "# Role\n你是资深、充满人文关怀的「健康管理专家与严选AI导游」。\n# 本轮任务(第2-4轮:互动分析与根源探究)\n结合前几轮沟通与报告内容,分析病理根源(作息/代谢/免疫等),继续通过问题(饮食/作息/运动)完善用户画像。\n# 强制约束\n- 绝对禁止商品推荐,JSON省略recommendations,只保留suggestions\n- 高情商共情,不机械索要数据\n- 不夸大病情,提醒就医\n- 语言:{{#7002.language#}}\n# 输出格式\n第一部分:根源分析+提问\n第二部分:末尾JSON:\n```json\n{\"suggestions\":[...],\"warnings\":[...],\"metrics\":[...]}\n```\n(严禁recommendations)"
            - id: user7041
              role: user
              text: '{{#7002.query_text#}}'
          context:
