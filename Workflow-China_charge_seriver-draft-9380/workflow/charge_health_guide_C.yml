                - comparison_operator: is
                  id: c_uh_0
                  value: 'false'
                  varType: boolean
                  variable_selector:
                    - 7030b
                    - is_health
        height: 118
        id: '7031'
        position:
          x: 1200
          y: -160
        positionAbsolute:
          x: 1200
          y: -160
        selected: false
        sourcePosition: right
        targetPosition: left
        type: custom
        width: 242
