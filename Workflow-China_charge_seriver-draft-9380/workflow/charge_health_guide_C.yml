        width: 242
      - data:
          title: LLM_健康判断
          type: llm
          selected: false
          model:
            completion_params:
              max_tokens: 1500
              temperature: 0.6
              top_p: 1
            mode: chat
            name: Doubao-Seed-2.0-lite
            provider: langgenius/volcengine_maas/volcengine_maas
          prompt_template:
            - id: sys7030
              role: system
              text: "你判断用户上传的内容是否为健康/医疗/体检相关。看图片(若有)和文本。\n输出严格JSON,不要markdown:\n{\"is_health\": true或false, \"summary\": \"若是健康报告则提取关键指标/异常摘要;若非健康则一句话说明原因\"}\n判定为健康的:体检单/化验单/影像报告/症状描述/健康咨询。非健康:风景照/无关截图/闲聊无健康信息。"
            - id: user7030
              role: user
              text: "语言:{{#7002.language#}}\n用户输入:{{#7002.query_text#}}\n(若上传了图片请结合图片判断)"
          vision:
            enabled: true
            configs:
              detail: high
              variable_selector:
                - sys
                - files
          context:
            enabled: false
            variable_selector: []
        height: 140
        id: '7030'
        position:
          x: 640
          y: -160
        positionAbsolute:
          x: 640
          y: -160
        selected: false
        sourcePosition: right
        targetPosition: left
        type: custom
        width: 242
      - data:
          title: code_解析健康
          type: code
          selected: false
          code: "import json, re\ndef main(text: str) -> dict:\n    t = text or ''\n    is_health = False\n    summary = ''\n    m = re.search(r'\\{.*\\}', t, re.DOTALL)\n    if m:\n        try:\n            d = json.loads(m.group(0))\n            is_health = bool(d.get('is_health', False))\n            summary = str(d.get('summary', ''))\n        except Exception:\n            is_health = 'true' in t.lower() and 'false' not in t.lower()\n            summary = t[:200]\n    else:\n        is_health = 'true' in t.lower() and 'false' not in t.lower()\n        summary = t[:200]\n    return {'is_health': is_health, 'report_summary': summary}\n"
          code_language: python3
          outputs:
            is_health:
              children:
              type: boolean
            report_summary:
              children:
              type: string
          variables:
            - value_selector:
                - '7030'
                - text
              variable: text
        height: 120
        id: 7030b
        position:
          x: 920
          y: -160
        positionAbsolute:
