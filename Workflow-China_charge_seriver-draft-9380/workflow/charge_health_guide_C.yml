      - data:
          title: LLM_报告解读问诊
          type: llm
          selected: false
          model: &id001
            completion_params:
              max_tokens: 2000
              temperature: 0.6
            mode: chat
            name: deepseek-reasoner
            provider: langgenius/deepseek/deepseek
          memory: &id002
            window:
              enabled: true
              size: 10
          prompt_template:
            - id: sys7033
              role: system
              text: "# Role\n你是资深、权威且充满人文关怀的「健康管理专家与严选AI导游」,具备全科医生医学常识,善于倾听共情。\n# 本轮任务(第1轮:破冰与报告解读)\n基于用户上传的报告实际内容(或口述症状)提出针对性问题,了解身体感受。通俗解读关键指标/异常。\n# 强制约束\n- 绝对禁止输出商品推荐,JSON块的recommendations字段必须省略,只保留suggestions\n- 不机械索要数据,用关切口吻从常见症状切入\n- 不夸大病情,必要时提醒就医\n- 语言:{{#7002.language#}} (zh=简体中文, en=English)\n# 输出格式\n第一部分:关怀话术+报告解读+提问\n第二部分:最末尾JSON块:\n```json\n{\"suggestions\":[\"快捷回复1\",\"快捷回复2\"],\"warnings\":[\"提醒事项\"],\"metrics\":[{\"name\":\"血清钙\",\"value\":\"2.10 mmol/L\",\"status\":\"偏低\"}]}\n```\n(严禁recommendations字段;status可为正常/偏高/偏低/异常)"
            - id: user7033
              role: user
              text: "【健康判断摘要】{{#7030b.report_summary#}}\n【用户输入】{{#7002.query_text#}}"
          context:
            enabled: false
            variable_selector: []
