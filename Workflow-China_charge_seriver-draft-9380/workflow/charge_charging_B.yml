        code: "def main(http_body: str) -> dict:\n    import json\n    try:\n        data = json.loads(http_body or \"{}\")\n    except Exception:\n        data = {}\n    rec = data.get(\"record\")\n    if not rec:\n        return {\"answer_text\": \"您当前会话暂未记录有效的反馈,如需反馈新问题请详细描述。\"}\n    dev = (rec.get(\"dev_status\") or \"\").strip()\n    op_desc = (rec.get(\"op_desc\") or \"\").strip()\n    rid = (rec.get(\"record_id\") or \"\").strip()\n    status_map = {\"问题未查阅\":\"已记录,待开发团队查阅\",\"开发中\":\"开发团队正在处理中\",\"已修复\":\"已修复完成\",\"已关闭\":\"已关闭\"}\n    status_text = status_map.get(dev, dev or \"处理中\")\n    text = \"您反馈的问题已记录,当前状态:\" + status_text + \"。\"\n    if op_desc:\n        text = \"您反馈的问题(\\\"\" + op_desc[:50] + \"\\\")已记录,当前状态:\" + status_text + \"。\"\n    if rid:\n        text += \"记录编号:\" + rid + \"。\"\n    text += \"我们会持续跟进,感谢您的耐心。\"\n    return {\"answer_text\": text}"
