    name: cv_feedback_zh
    value: ''
    value_type: string
  - description: N5转写的模块字段 (跨轮保留供N16写表/N17锚点)
    id: a1b2c3d4-0001-4000-8000-000000000001
    name: cv_mokuai
    value: ''
    value_type: string
  - description: N5转写的环境字段 (跨轮保留供N16写表)
    id: a1b2c3d4-0001-4000-8000-000000000002
    name: cv_huanjing
    value: ''
    value_type: string
  - description: N5转写的类型字段 (跨轮保留供N16写表)
    id: a1b2c3d4-0001-4000-8000-000000000003
    name: cv_leixing
    value: ''
    value_type: string
  - description: 信息不足引导补充计数(0=未引导,1=引导1次,2=引导2次,>=2触发兜底待确认)
    id: a1b2c3d4-0001-4000-8000-000000000004
    name: cv_clarify_count
    value: 0
    value_type: number
  - description: 充足度标签(SUFFICIENT/INSUFFICIENT), 6250-if 读取(避免引用未运行节点)
