    value: false
    value_type: boolean
  - description: '二阶段主状态机: IDLE/await_confirm_identity/await_diff/await_diff_decision/await_confirm_modify/await_confirm_new'
    id: 9be2e3b5-8e6b-9f7c-ac1c-5e6f7a8b9c0d
    name: cv_flow_state
    value: IDLE
    value_type: string
