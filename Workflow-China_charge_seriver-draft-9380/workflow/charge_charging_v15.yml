    - data: {sourceType: any, targetType: any}
      id: e-5101-5104
      source: '5101'
      sourceHandle: class_unclear
      target: '5104'
      targetHandle: target
      type: custom
    - data: {sourceType: any, targetType: any}
      id: e-5101-5105
      source: '5101'
      sourceHandle: class_custom
      target: '5105'
      targetHandle: target
      type: custom
    - data: {sourceType: any, targetType: any}
      id: e-5101-5102
      source: '5101'
      sourceHandle: class_basic
      target: '5102'
      targetHandle: target
      type: custom
    # FAQ 快路径
    - data: {sourceType: any, targetType: any}
