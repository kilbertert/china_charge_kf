    - data: {sourceType: any, targetType: any}
      id: e-5221-5098
      source: '5221'
      sourceHandle: source
      target: '5098'
      targetHandle: target
      type: custom
    - data: {sourceType: any, targetType: any}
      id: e-5231-5098
      source: '5231'
      sourceHandle: source
      target: '5098'
      targetHandle: target
      type: custom
    - data: {sourceType: any, targetType: any}
      id: e-5242-5098
      source: '5242'
      sourceHandle: source
      target: '5098'
      targetHandle: target
      type: custom
    - data: {sourceType: any, targetType: any}
      id: e-5243-5098
      source: '5243'
      sourceHandle: source
      target: '5098'
      targetHandle: target
      type: custom
    - data: {sourceType: any, targetType: any}
      id: e-5098-5099
      source: '5098'
      sourceHandle: source
      target: '5099'
      targetHandle: target
      type: custom
    nodes:
    # ============ 5001 入口 (L0 第一轮对话确认) ============
    - data:
        selected: false
        title: 接收多模态输入
        type: start
        variables:
        - default: ''
          label: 用户文本
          max_length: 4000
          required: false
          type: paragraph
          variable: input_text
        - default: ''
          label: 语言(可选)
          options: [zh, en, vi, '']
          required: false
          type: select
          variable: input_language
        - label: 图片(可选)
          required: false
          type: file-list
          variable: input_img_id
        - default: 1
          label: 轮次
          required: false
          type: number
          variable: input_turn
        - default: ''
          label: 会话ID
          required: false
          type: text-input
          variable: input_session_id
        - default: ''
          label: 端类型
          options: [user, butler, pc, '']
          required: false
          type: select
          variable: input_hint_endpoint
        - default: ''
          label: 地域
          options: [cn, overseas, '']
          required: false
          type: select
          variable: input_hint_region
      height: 265
      id: '5001'
      position: {x: -700, y: 0}
      positionAbsolute: {x: -700, y: 0}
      selected: false
      type: custom
      width: 242
    # ============ 5002 自动检测语言 ============
    - data:
        code: "\ndef main(input_text: str, input_language: str) -> dict:\n    if input_language\
          \ and input_language.strip():\n        return {\"input_language\": input_language,\
          \ \"detected\": False}\n    text = input_text or \"\"\n    cjk_count = sum(1\
          \ for c in text if '\\u4e00' <= c <= '\\u9fff')\n    vi_chars = \"ăâđêôơưĂÂĐÊÔƠƯáàảãạắằẳẵặấầẩẫậéèẻẽẹếềểễệíìỉĩịóòỏõọốồổỗộớờởỡợúùủũụứừửữựýỳỷỹỵ\"\
          \n    has_vi = any(c in vi_chars for c in text)\n    if has_vi: lang = \"\
          vi\"\n    elif cjk_count > 0: lang = \"zh\"\n    else: lang = \"en\"\n \
          \   return {\"input_language\": lang, \"detected\": True}\n"
        code_language: python3
        outputs:
          detected: {children: null, type: boolean}
          input_language: {children: null, type: string}
        selected: false
        title: code_自动检测语言
        type: code
        variables:
        - value_selector: ['5001', input_text]
          variable: input_text
        - value_selector: ['5001', input_language]
          variable: input_language
      height: 52
      id: '5002'
      position: {x: -430, y: 0}
      positionAbsolute: {x: -430, y: 0}
      selected: false
      type: custom
      width: 242
    # ============ 5101 L1 板块路由 (流程1: 是否清楚板块 + 流程2: 是否基础功能) ============
    - data:
        classes:
        - id: class_basic
          name: basic_feature
        - id: class_custom
          name: custom_feature
        - id: class_unclear
          name: unclear_module
        instruction: '基于语义理解,先做"流程1:是否清楚功能板块",再做"流程2:是否属于基础功能",给出唯一分类。


          **判定规则**:

          1. 用户模糊/太短/无法判断涉及哪个功能板块 → class_unclear

          2. 用户清楚表达了功能板块,且属于标准基础功能(计费/订单/设备/场地/用户/财务/报表等平台通用功能) → class_basic

          3. 用户问的是项目级/定制/增值/对接类功能(非标准基础功能,通常需产品或商务确认) → class_custom

          4. 不要用关键词匹配,要理解用户意图的语义

          5. 只能选一个分类'
        model:
          mode: chat
          name: Doubao-Seed-2.0-lite
          provider: langgenius/volcengine_maas/volcengine_maas
        query_variable_selector: ['5001', input_text]
        selected: false
        title: L1 板块路由 (流程1+流程2)
        type: question-classifier
      height: 304
      id: '5101'
      position: {x: -160, y: 0}
      positionAbsolute: {x: -160, y: 0}
      selected: false
      type: custom
      width: 242
    # ============ 5104 流程1-N: 再问对话提问 (澄清追问) ============
    - data:
        context: {enabled: false, variable_selector: []}
        model:
          mode: chat
          name: Doubao-Seed-2.0-lite
          provider: langgenius/volcengine_maas/volcengine_maas
        prompt_template:
        - id: l1-unclear-sys
          role: system
          text: '你是充电桩智能客服。用户输入模糊或无法判断功能板块,需要礼貌追问以确认功能板块(对应架构"流程1-N:再问对话提问")。


            **规则**:

            1. 严格只输出追问文本

            2. 引导用户说明:涉及哪个功能板块(如计费/订单/设备/场地/用户/财务)以及具体问题

            3. 简洁,不超过80字


            用户问: {{#5001.input_text#}}

            板块判定: {{#5101.class_name#}}'
        - id: l1-unclear-user
          role: user
          text: '{{#5001.input_text#}}'
        reasoning_format: separated
        selected: false
        title: 流程1-N 再问对话提问
        type: llm
        vision:
          configs: {detail: high, variable_selector: ['5001', input_img_id]}
          enabled: true
      height: 88
      id: '5104'
      position: {x: 130, y: -360}
      positionAbsolute: {x: 130, y: -360}
      selected: false
      type: custom
      width: 242
    # ============ 5105 流程2-N: 非基础功能 → 介绍+提示产品商务沟通+二次确认 ============
    - data:
        context: {enabled: false, variable_selector: []}
        model:
          mode: chat
          name: Doubao-Seed-2.0-lite
          provider: langgenius/volcengine_maas/volcengine_maas
        prompt_template:
        - id: l1-custom-sys
          role: system
          text: '你是充电桩智能客服。用户询问的是项目级/定制/增值功能(非标准基础功能,对应架构"流程2-N")。


            **规则**:

            1. 严格只输出最终答案文本

            2. 简要介绍该功能的定位(基于已知信息,不编造)

            3. 提示:该功能需与产品和商务进一步沟通确认

            4. 提示:如该功能在本项目已开通,请二次确认项目名称

            5. 简洁,150字以内


            用户问: {{#5001.input_text#}}

            板块判定: {{#5101.class_name#}}'
        - id: l1-custom-user
          role: user
          text: '{{#5001.input_text#}}'
        reasoning_format: separated
        selected: false
        title: 流程2-N 非基础功能(转产品/商务)
        type: llm
        vision:
          configs: {detail: high, variable_selector: ['5001', input_img_id]}
          enabled: true
      height: 88
      id: '5105'
      position: {x: 130, y: -150}
      positionAbsolute: {x: 130, y: -150}
      selected: false
      type: custom
      width: 242
    # ============ 5102 流程2-Y: 查询常见问题 (FAQ 快路径) ============
    - data:
        dataset_ids:
        - VcBiFnZNjdnZ2cxehDh+oNlTGHwBN3UMDpHNHj012ETQjjZYo/L3gyOmbvdcZm5e
        - cJ687vaaJbsFc7MghKK/6gS+0+mJHna8xcsp3EgZpz4FTn6Z2PZ8MtU8c36SDHxB
        multiple_retrieval_config:
          reranking_enable: true
          reranking_mode: reranking_model
          reranking_model:
            model: qwen3-rerank
            provider: langgenius/tongyi/tongyi
          score_threshold: 0.3
          top_k: 3
        query_attachment:
          enabled: false
          query_attachment_selector: []
        query_variable_selector: ['5001', input_text]
        retrieval_mode: multiple
        selected: false
        title: KR 常见问题 (FAQ快路径)
        type: knowledge-retrieval
      height: 118
      id: '5102'
      position: {x: 130, y: 60}
      positionAbsolute: {x: 130, y: 60}
      selected: false
      type: custom
      width: 242
    # ============ 5103 FAQ 是否命中 (菱形判断) ============
    - data:
        cases:
        - case_id: faq_hit
          logical_operator: and
          conditions:
          - variable_selector: ['5102', result]
            comparison_operator: not empty
        selected: false
        title: FAQ 是否命中
        type: if-else
      height: 118
      id: '5103'
      position: {x: 400, y: 60}
      positionAbsolute: {x: 400, y: 60}
      selected: false
      type: custom
      width: 242
    # ============ 5106 FAQ 命中: 输出答案 + 询问是否其他问题 ============
    - data:
        context:
          enabled: true
          variable_selector: ['5102', result]
        model:
          mode: chat
          name: Doubao-Seed-2.0-lite
          provider: langgenius/volcengine_maas/volcengine_maas
        prompt_template:
        - id: faq-sys
          role: system
          text: '你是充电桩智能客服,基于下方常见问题知识库回答(对应架构"FAQ命中:输出问题答案,并询问是否有其他问题")。


            **规则**:

            1. 严格只输出最终答案文本

            2. 必须基于知识库检索结果,严禁编造

            3. 若上下文为空,说:"该问题暂未收录,建议联系平台客服"

            4. 回答后追问:"请问还有其他问题吗?"

            5. 简洁,150字以内


            用户问: {{#5001.input_text#}}

            常见问题检索结果:

            {{#context#}}'
        - id: faq-user
          role: user
          text: '{{#5001.input_text#}}'
        reasoning_format: separated
        selected: false
        title: FAQ 命中答案
        type: llm
        vision:
          configs: {detail: high, variable_selector: ['5001', input_img_id]}
          enabled: true
      height: 88
      id: '5106'
      position: {x: 670, y: -80}
      positionAbsolute: {x: 670, y: -80}
      selected: false
      type: custom
      width: 242
    # ============ 5201 L3 意图识别 (4路分发枢纽) ============
    - data:
        classes:
        - id: class_a
          name: path_a_location
        - id: class_b
          name: path_b_business
        - id: class_c
          name: path_c_process
        - id: class_d
          name: path_d_bug
        instruction: '基于语义理解,在已确认的基础功能板块内,判断用户问题属于哪条意图路径(对应架构"模块1:意图识别")。


          **重要规则**:

          1. 不要用关键词匹配,要理解用户意图的语义

          2. 用户发图片(截屏反馈),通常是想反馈 bug/问题 → path_d_bug

          3. 用户问"怎么/如何 + 操作(添加/设置/配置/创建/启用)" → path_b_business

          4. 用户被系统阻止("拦截/卡住/失败/报错") → path_c_process

          5. 用户问"在哪/怎么找/怎么进入" → path_a_location

          6. 用户报告"bug/错误/不工作" → path_d_bug'
        model:
          mode: chat
          name: Doubao-Seed-2.0-lite
          provider: langgenius/volcengine_maas/volcengine_maas
        query_variable_selector: ['5001', input_text]
        selected: false
        title: L3 意图识别 (4路分发)
        type: question-classifier
      height: 304
      id: '5201'
      position: {x: 670, y: 220}
      positionAbsolute: {x: 670, y: 220}
      selected: false
      type: custom
      width: 242
    # ============ 路径 A: 功能查找位置 ============
    # 5210 A2: 生成短词条
    - data:
        context: {enabled: false, variable_selector: []}
        model:
          mode: chat
          name: Doubao-Seed-2.0-lite
          provider: langgenius/volcengine_maas/volcengine_maas
        prompt_template:
        - id: a2-sys
          role: system
          text: '你是充电桩功能导航助手。根据用户问题和可能的功能模块,生成用于菜单路径检索的短词条(对应架构"路径A-流程1:生成可能的存在性短词条")。


            **规则**:

            1. 输出3-6个短词条,用逗号分隔,只输出词条本身

            2. 词条应为功能/菜单名称的同义词和可能叫法(如"计费模板""节日计费""场地设置")

            3. 不要输出解释、编号或引号


            用户问: {{#5001.input_text#}}'
        - id: a2-user
          role: user
          text: '{{#5001.input_text#}}'
        reasoning_format: separated
        selected: false
        title: A2 生成短词条
        type: llm
        vision:
          configs: {detail: high, variable_selector: ['5001', input_img_id]}
          enabled: true
      height: 88
      id: '5210'
      position: {x: 940, y: -360}
      positionAbsolute: {x: 940, y: -360}
      selected: false
      type: custom
      width: 242
    # 5211 A3: 根据词条查询菜单路径并合并
    - data:
        dataset_ids:
        - cJ687vaaJbsFc7MghKK/6gS+0+mJHna8xcsp3EgZpz4FTn6Z2PZ8MtU8c36SDHxB
        - qiObsMxLa6goPNUgmSUP80dC+6bIiCDN0j3GzwiSDfKjL3jJ1iJeBXBbavRn5n+U
        multiple_retrieval_config:
          reranking_enable: true
          reranking_mode: reranking_model
          reranking_model:
            model: qwen3-rerank
            provider: langgenius/tongyi/tongyi
          score_threshold: 0.3
          top_k: 5
        query_attachment:
          enabled: false
          query_attachment_selector: []
        query_variable_selector: ['5210', text]
        retrieval_mode: multiple
        selected: false
        title: A3 查询菜单路径
        type: knowledge-retrieval
