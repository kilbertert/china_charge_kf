              try:
                  data = json.loads(text)
                  return data if isinstance(data, dict) else {}
              except Exception:
                  return {}


          def _extract_worst_t_value(text):
              raw = text or ""
              patterns = [
                  r"(?:T值|T 值|T-score|T score)\s*[:：]?\s*([+-]?\d+(?:\.\d+)?)",
                  r"([+-]?\d+(?:\.\d+)?)\s*(?:为)?\s*(?:T值|T 值|T-score|T score)",
              ]
              values = []
              for pattern in patterns:
                  for item in re.findall(pattern, raw, flags=re.IGNORECASE):
                      try:
                          values.append(float(item))
                      except Exception:
                          pass
              if not values:
                  return None
              return min(values)


          def _score_fixed_answers(answers, scores, evidences):
              recognized = any(question_id in answers for question_id in FIXED_RULES.keys())
              for question_id, option_rules in FIXED_RULES.items():
                  answer = str(answers.get(question_id, "")).strip()
                  if answer in option_rules:
                      for tag, weight, evidence in option_rules[answer]:
                          scores[tag] += weight
                          evidences.append(evidence)
              return recognized


          def _score_semantic_answers(answers, scores, evidences):
              recognized = False
              age = str(answers.get("age_range", "")).strip()
              sex = str(answers.get("sex", "")).strip()
              supplement = str(answers.get("supplement_frequency", "")).strip()
              exercise = str(answers.get("outdoor_exercise_duration", "")).strip()
              medication = str(answers.get("medication_history", "")).strip()

              if any([age, sex, supplement, exercise, medication]):
                  recognized = True

              if sex == "female" and age in ("50_60", "o60"):
                  scores["menopause_related"] += 3
                  evidences.append("女性且年龄位于绝经相关高发区间")
              elif sex == "female" and age == "40_50":
                  scores["menopause_related"] += 1
                  evidences.append("女性且接近绝经年龄段")

              if supplement == "rarely":
                  scores["calcium_protein_deficient"] += 2
                  scores["vitamin_d_deficient"] += 2
                  evidences.append("日常很少补充钙或维生素D")
              elif supplement == "sometimes":
                  scores["calcium_protein_deficient"] += 1
                  scores["vitamin_d_deficient"] += 1
                  evidences.append("钙和维生素D补充频率偏低")

              if exercise == "less1":
                  scores["exercise_deficient"] += 2
                  scores["vitamin_d_deficient"] += 1
                  evidences.append("户外运动时长不足")
              elif exercise == "1to3":
                  scores["exercise_deficient"] += 1
                  evidences.append("户外运动一般")

              if medication == "yes":
                  scores["medication_related"] += 3
                  evidences.append("存在长期影响骨代谢的用药史")

              if age == "o60":
                  scores["fracture_high_risk"] += 1
                  evidences.append("年龄较大,骨折风险相对更高")

              return recognized


          def _pick_tag(scores):
              ranked = sorted(
                  TAG_PRIORITY,
                  key=lambda tag: (scores.get(tag, 0), -TAG_PRIORITY.index(tag)),
                  reverse=True,
              )
              top_tag = ranked[0]
              return top_tag, scores.get(top_tag, 0)


          def main(report_text: str, answers_text: str) -> dict:
              answers = _parse_answers(answers_text)
              scores = {tag: 0 for tag in TAG_PRIORITY}
              evidences = []

              fixed_recognized = _score_fixed_answers(answers, scores, evidences)
              semantic_recognized = _score_semantic_answers(answers, scores, evidences)

              worst_t_value = _extract_worst_t_value(report_text)
              if worst_t_value is not None:
                  if worst_t_value <= -2.5:
                      scores["fracture_high_risk"] += 2
                      evidences.append("报告最低 T 值达到骨质疏松风险区间")
                  elif worst_t_value <= -2.0:
                      scores["fracture_high_risk"] += 1
                      evidences.append("报告最低 T 值明显偏低")

              if not fixed_recognized and not semantic_recognized:
                  result = {
                      "tag": "insufficient_data",
                      "risk_level": "low",
                      "confidence": 0.3,
                      "reasoning": "未识别到固定量表答案,无法进入标准方案分流。",
                      "missingEvidence": ["固定骨密度原因分析量表答案"],
                  }
                  return {"text": json.dumps(result, ensure_ascii=False)}

              top_tag, top_score = _pick_tag(scores)
              if top_score <= 0:
                  result = {
                      "tag": "insufficient_data",
                      "risk_level": "low",
                      "confidence": 0.4,
                      "reasoning": "量表答案未形成明确的原因倾向,建议补充更完整病史或由医生进一步评估。",
                      "missingEvidence": [],
                  }
                  return {"text": json.dumps(result, ensure_ascii=False)}

              confidence = min(0.95, 0.72 + top_score * 0.05)
              reasoning = "；".join(dict.fromkeys(evidences)) if evidences else "依据固定量表得分落入标准方案。"
              result = {
                  "tag": top_tag,
                  "risk_level": TAG_RISK[top_tag],
                  "confidence": confidence,
                  "reasoning": reasoning,
                  "missingEvidence": [],
              }
              return {"text": json.dumps(result, ensure_ascii=False)}
