    - data:
        code: |-
          import json
          import re

          ALLOWED_METRIC_KEYWORDS = (
              "T值", "T 值", "T-score", "T score", "Z值", "Z 值", "Z-score",
              "25-OH", "维生素D", "维生素 D", "血钙", "BMD", "骨密度"
          )
          T_VALUE_MIN = -10.0
          T_VALUE_MAX = 5.0
          ALLOWED_PP_NAMES = frozenset({
              "骨密度下降", "骨量减少", "骨质疏松", "维生素D不足", "血钙异常",
              "T值偏低", "T值异常", "腰椎骨密度下降", "股骨颈骨密度下降", "全髋骨密度下降",
          })
          REPORT_QUESTION_ID_ALIASES = {
              "q1": "age_range",
              "q2": "sex",
              "q3": "supplement_frequency",
              "q4": "outdoor_exercise_duration",
              "q5": "medication_history",
              "q_age": "age_range",
              "q_lifestyle": "outdoor_exercise_duration",
              "q_history": "medication_history",
          }


          def _parse_llm_json(llm_text):
              text = (llm_text or "").strip()
              if not text:
                  return {}
              try:
                  if text.startswith("{"):
                      return json.loads(text)
              except Exception:
                  pass
              match = re.search(r"\{[\s\S]*\}", text)
              if match:
                  try:
                      return json.loads(match.group(0))
                  except Exception:
                      return {}
              return {}


          def _grade_t(value):
              try:
                  v = float(value)
              except Exception:
                  return "unknown"
              if v >= -1.0:
                  return "normal"
              if v > -2.5:
                  return "bone_loss"
              return "osteoporosis"


          def _is_valid_metric_name(name):
              return isinstance(name, str) and any(keyword in name for keyword in ALLOWED_METRIC_KEYWORDS)


          def _safe_float(value):
              try:
                  return float(value)
              except Exception:
                  return None


          def _is_valid_t_value(value):
              f = _safe_float(value)
              return f is not None and T_VALUE_MIN <= f <= T_VALUE_MAX


          def _normalize_question_id(index, raw_id, text):
              qid = str(raw_id or "").strip()
              normalized = REPORT_QUESTION_ID_ALIASES.get(qid, qid)
              text_value = str(text or "").strip()
              if normalized:
                  return normalized
              if "年龄" in text_value:
                  return "age_range"
              if "性别" in text_value:
                  return "sex"
              if "维生素D" in text_value or "补充钙" in text_value or "补充维生素D" in text_value:
                  return "supplement_frequency"
              if "户外运动" in text_value or "日晒" in text_value or "运动" in text_value:
                  return "outdoor_exercise_duration"
              if "药物" in text_value or "骨折" in text_value or "骨代谢" in text_value:
                  return "medication_history"
              default_ids = [
                  "age_range",
                  "sex",
                  "supplement_frequency",
                  "outdoor_exercise_duration",
                  "medication_history",
              ]
              return default_ids[index] if index < len(default_ids) else f"report_followup_{index+1}"


          def _sanitize_questions(raw_questions):
              if not isinstance(raw_questions, list):
                  return None
              questions = []
              seen_ids = set()
              for index, item in enumerate(raw_questions):
                  if not isinstance(item, dict):
                      continue
                  text = str(item.get("text", "")).strip()
                  qid = _normalize_question_id(index, item.get("id", ""), text)
                  options = item.get("options")
                  if not qid or not text or not isinstance(options, list):
                      continue
                  clean_options = []
                  seen_keys = set()
                  for option in options:
                      if not isinstance(option, dict):
                          continue
                      key = str(option.get("key", "")).strip()
                      label = str(option.get("label", "")).strip()
                      if not key or not label or key in seen_keys:
                          continue
                      seen_keys.add(key)
                      clean_options.append({"key": key, "label": label})
                  if len(clean_options) < 2 or qid in seen_ids:
                      continue
                  seen_ids.add(qid)
                  questions.append({"id": qid, "text": text, "options": clean_options})
                  if len(questions) >= 5:
                      break
              return questions if len(questions) >= 3 else None


          def _fallback_questions():
              return [
                  {
                      "id": "age_range",
                      "text": "您的年龄段是?",
                      "options": [
                          {"key": "u40", "label": "40 岁以下"},
                          {"key": "40_50", "label": "40-50 岁"},
                          {"key": "50_60", "label": "50-60 岁"},
                          {"key": "o60", "label": "60 岁以上"},
                      ],
                  },
                  {
                      "id": "sex",
                      "text": "您的性别是?",
                      "options": [
                          {"key": "male", "label": "男"},
                          {"key": "female", "label": "女"},
                          {"key": "na", "label": "不便透露"},
                      ],
                  },
                  {
                      "id": "supplement_frequency",
                      "text": "您日常补充钙或维生素D的频率是?",
                      "options": [
                          {"key": "daily", "label": "几乎每天补充"},
                          {"key": "sometimes", "label": "偶尔补充"},
                          {"key": "rarely", "label": "几乎不补充"},
                      ],
                  },
                  {
                      "id": "outdoor_exercise_duration",
                      "text": "您每周累计户外运动的时长大概是?",
                      "options": [
                          {"key": "less1", "label": "不足1小时"},
                          {"key": "1to3", "label": "1-3小时"},
                          {"key": "more3", "label": "3小时以上"},
                      ],
                  },
                  {
                      "id": "medication_history",
                      "text": "您是否有长期服用影响骨代谢的相关药物史?",
                      "options": [
                          {"key": "yes", "label": "是"},
                          {"key": "no", "label": "否"},
                          {"key": "unknown", "label": "不清楚"},
                      ],
                  },
              ]


          def _insufficient(reason, user_message):
              payload = {
                  "reportType": "bone_density",
                  "dataComplete": False,
                  "reason": reason,
                  "userMessage": user_message,
                  "metrics": [],
                  "problemPriority": [],
              }
              response = {
                  "scene": "report",
                  "risk_level": "low",
                  "scene_confidence": 0.3,
                  "payloadKind": "insufficient_data",
                  "payload": payload,
              }
              return {"output": json.dumps(response, ensure_ascii=False)}


          def main(llm_text):
              data = _parse_llm_json(llm_text)
              confidence = str(data.get("confidence", "")).strip().lower()
              llm_data_complete = bool(data.get("dataComplete", False))
              if llm_data_complete and confidence != "high":
                  return _insufficient(
                      "fabrication_detected",
                      "AI 无法确认报告中的真实指标。请重新上传清晰 DXA 报告,或直接粘贴 T 值原文。"
                  )

              raw_metrics = data.get("metrics") or []
              if not isinstance(raw_metrics, list):
                  raw_metrics = []

              metrics = []
              t_values = []
              for metric in raw_metrics:
                  if not isinstance(metric, dict):
                      continue
                  name = metric.get("name", "")
                  if not _is_valid_metric_name(name):
                      continue
                  clean_metric = {
                      "name": name,
                      "value": metric.get("value"),
                      "unit": metric.get("unit", ""),
                  }
                  if "T" in name or "t" in name:
                      if not _is_valid_t_value(clean_metric["value"]):
                          continue
                      clean_metric["level"] = _grade_t(clean_metric["value"])
                      t_values.append(float(clean_metric["value"]))
                  else:
                      clean_metric["level"] = "reported"
                  metrics.append(clean_metric)

              if not t_values:
                  return _insufficient(
                      "no_metrics_extracted",
                      "未识别到可信的骨密度 T 值。请上传清晰 DXA 报告,或直接粘贴如“腰椎 L1-L4 T值 -2.1”的原文。"
                  )

              levels = [metric.get("level", "unknown") for metric in metrics]
              if "osteoporosis" in levels:
                  risk_level = "high"
              elif "bone_loss" in levels:
                  risk_level = "medium"
              else:
                  risk_level = "low"

              one_line = str(data.get("oneLineConclusion", "")).strip()
              if not one_line:
                  one_line = "本次仅基于已识别到的报告指标做初步整理,不能替代医生面诊。"

              problem_priority = []
              raw_problem_priority = data.get("problemPriority") or []
              if isinstance(raw_problem_priority, list):
                  for item in raw_problem_priority:
                      if not isinstance(item, dict):
                          continue
                      name = item.get("name")
                      if name not in ALLOWED_PP_NAMES:
                          continue
                      problem_priority.append({
                          "rank": item.get("rank"),
                          "name": name,
                          "level": item.get("level", ""),
                      })

              follow_up = _sanitize_questions(data.get("followUpQuestions")) or _fallback_questions()
              worst_t_value = min(t_values)

              payload = {
                  "reportType": "bone_density",
                  "dataComplete": True,
                  "metrics": metrics,
                  "tValueChart": {
                      "normal": -1.0,
                      "yours": worst_t_value,
                      "thresholds": {"normal": -1.0, "loss": -2.5},
                  },
                  "metricJudgements": [
                      {
                          "name": metric["name"],
                          "value": metric["value"],
                          "level": metric.get("level", "reported"),
                      }
                      for metric in metrics
                  ],
                  "oneLineConclusion": one_line,
                  "problemPriority": problem_priority,
                  "questions": follow_up,
              }

              response = {
                  "scene": "report",
                  "risk_level": risk_level,
                  "scene_confidence": 0.85,
                  "payloadKind": "complete",
                  "payload": payload,
              }
              return {"output": json.dumps(response, ensure_ascii=False)}
