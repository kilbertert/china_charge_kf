    - data:
        code: |-
          import json
          import re

          ALLOWED_INTENTS = {"leg_pain", "back_pain", "joint_pain", "general_symptom"}
          INTENT_TO_QREF = {
              "leg_pain": "leg_pain_v1",
              "back_pain": "back_pain_v1",
              "joint_pain": "joint_pain_v1",
              "general_symptom": "general_symptom_v1",
          }
          URGENT_TEXT_PATTERNS = [
              "突然剧烈", "剧烈疼痛", "不能站", "不能走", "无法负重", "胸痛", "胸闷", "呼吸困难",
              "气短", "一侧肿胀", "明显肿胀", "红肿热痛", "发热寒战", "麻木无力", "外伤后",
          ]
          URGENT_ANSWER_KEYS = [
              "sudden_severe", "cannot_stand", "chest_discomfort",
              "fever_red_swollen", "weakness_numbness", "trauma",
          ]


          def _parse_json(text):
              raw = (text or "").strip()
              if not raw:
                  return {}
              try:
                  if raw.startswith("{"):
                      return json.loads(raw)
              except Exception:
                  pass
              match = re.search(r"\{[\s\S]*\}", raw)
              if match:
                  try:
                      return json.loads(match.group(0))
                  except Exception:
                      return {}
              return {}


          def _parse_answers(answers):
              raw = (answers or "").strip()
              if not raw or raw == "{}":
                  return {}
              try:
                  data = json.loads(raw)
                  return data if isinstance(data, dict) else {}
              except Exception:
                  return {}


          def _fallback_intent(raw_text):
              text = (raw_text or "").lower()
              if re.search(r"腿|膝|小腿|大腿|脚|踝", text):
                  return "leg_pain"
              if re.search(r"腰|背|臀|坐骨", text):
                  return "back_pain"
              if re.search(r"关节|肩|肘|腕|手指", text):
                  return "joint_pain"
              return "general_symptom"


          def main(llm_text: str, raw_text: str, answers: str) -> dict:
              parsed = _parse_json(llm_text)
              answer_dict = _parse_answers(answers)
              has_answers = bool(answer_dict)

              intent = str(parsed.get("intent", "")).strip()
              if intent not in ALLOWED_INTENTS:
                  intent = _fallback_intent(raw_text)
              questionnaire_ref = str(parsed.get("questionnaireRef", "")).strip()
              if questionnaire_ref != INTENT_TO_QREF.get(intent):
                  questionnaire_ref = INTENT_TO_QREF[intent]

              urgent = bool(parsed.get("urgent", False))
              matched_flags = []
              raw_flags = parsed.get("redFlags") or []
              if isinstance(raw_flags, list):
                  matched_flags.extend(str(item).strip() for item in raw_flags if str(item).strip())

              for key in URGENT_ANSWER_KEYS:
                  if answer_dict.get(key) == "yes":
                      urgent = True
                      matched_flags.append(key)

              for keyword in URGENT_TEXT_PATTERNS:
                  if keyword in (raw_text or ""):
                      urgent = True
                      matched_flags.append(keyword)

              dedup_flags = []
              for item in matched_flags:
                  if item and item not in dedup_flags:
                      dedup_flags.append(item)

              return {
                  "urgent": urgent,
                  "matched": "、".join(dedup_flags),
                  "intent": intent,
                  "questionnaire_ref": questionnaire_ref,
                  "has_answers": has_answers,
              }
