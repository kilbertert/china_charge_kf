          def _parse_answers(answers):
              raw = (answers or "").strip()
              if not raw or raw == "{}":
                  return {}
              try:
                  data = json.loads(raw)
                  return data if isinstance(data, dict) else {}
              except Exception:
                  return {}


          def _insufficient(questionnaire_ref):
              questionnaire = QUESTIONNAIRES.get(questionnaire_ref) or QUESTIONNAIRES["general_symptom_v1"]
              payload = {
                  "dataComplete": False,
                  "symptomIntent": questionnaire["intent"],
                  "currentStep": "questionnaire",
                  "questionnaireRef": questionnaire_ref,
                  "questionnaireTitle": questionnaire["title"],
                  "userMessage": "为避免误判,请先补充以下固定问卷后再继续判断。",
                  "questions": questionnaire["questions"],
              }
              return "insufficient_data", "low", payload


          def _complete(intent, questionnaire_ref, tag, risk_level, department, conclusion, answers):
              payload = {
                  "dataComplete": True,
                  "symptomIntent": intent,
                  "questionnaireRef": questionnaire_ref,
                  "tag": tag,
                  "riskLevel": risk_level,
                  "department": department,
                  "oneLineConclusion": conclusion,
                  "reasoningBasis": answers,
              }
              return "complete", risk_level, payload


          def _interpret_leg_pain(answers, questionnaire_ref):
              if len(answers) < 3:
                  return _insufficient(questionnaire_ref)
              if answers.get("weakness_numbness") == "yes":
                  return _complete("leg_pain", questionnaire_ref, "possible_nerve_related", "medium", "骨科 / 康复科", "腿痛伴麻木或无力,更需要线下评估是否存在神经受刺激。", answers)
              if answers.get("trigger") == "stairs" or answers.get("location") == "knee":
                  return _complete("leg_pain", questionnaire_ref, "joint_load_related", "medium", "骨科 / 运动医学", "腿痛更像与膝关节负重或活动相关,建议先减少高负荷动作。", answers)
              if answers.get("duration") == "gt_2w":
                  return _complete("leg_pain", questionnaire_ref, "persistent_leg_pain", "medium", "骨科 / 康复科", "腿痛持续时间偏长,建议做线下检查明确软组织或关节原因。", answers)
              return _complete("leg_pain", questionnaire_ref, "soft_tissue_overuse", "low", "康复科 / 骨科", "当前更像软组织劳损或过度使用后的疼痛,先休息和减少负重。", answers)


          def _interpret_back_pain(answers, questionnaire_ref):
              if len(answers) < 3:
                  return _insufficient(questionnaire_ref)
              if answers.get("radiation") == "yes" or answers.get("weakness_numbness") == "yes":
                  return _complete("back_pain", questionnaire_ref, "possible_radicular_back_pain", "medium", "骨科 / 脊柱外科", "腰背痛伴放射或麻木表现,建议线下排查神经受压。", answers)
              if answers.get("duration") == "gt_1m":
                  return _complete("back_pain", questionnaire_ref, "chronic_back_pain", "medium", "骨科 / 康复科", "腰背痛持续时间较长,建议做规范评估并开始康复训练。", answers)
              return _complete("back_pain", questionnaire_ref, "mechanical_back_pain", "low", "康复科", "腰背痛更像姿势或活动相关问题,先减少久坐久弯并观察。", answers)


          def _interpret_joint_pain(answers, questionnaire_ref):
              if len(answers) < 3:
                  return _insufficient(questionnaire_ref)
              if answers.get("swelling") == "yes" and answers.get("morning_stiffness") == "yes":
                  return _complete("joint_pain", questionnaire_ref, "inflammatory_joint_pattern", "medium", "风湿免疫科 / 骨科", "关节痛伴肿胀和晨僵,建议进一步排查炎症性问题。", answers)
              if answers.get("activity_related") == "load":
                  return _complete("joint_pain", questionnaire_ref, "load_related_joint_pain", "low", "骨科 / 运动医学", "更像活动负荷相关的关节不适,先减少重复负重和高冲击动作。", answers)
              return _complete("joint_pain", questionnaire_ref, "nonspecific_joint_pain", "low", "骨科", "当前信息更像非特异性关节痛,建议先记录部位与诱因。", answers)


          def _interpret_general(answers, questionnaire_ref):
              if len(answers) < 2:
                  return _insufficient(questionnaire_ref)
              if answers.get("daily_impact") == "high":
                  return _complete("general_symptom", questionnaire_ref, "needs_offline_assessment", "medium", "全科 / 对应专科", "症状已明显影响日常活动,建议尽快线下就诊完善检查。", answers)
              return _complete("general_symptom", questionnaire_ref, "generic_low_risk_symptom", "low", "全科", "当前信息不足以支持更具体判断,建议先补充病程和伴随症状。", answers)


          def main(intent: str, questionnaire_ref: str, answers: str) -> dict:
              qref = questionnaire_ref if questionnaire_ref in QUESTIONNAIRES else "general_symptom_v1"
              answer_dict = _parse_answers(answers)
              if not answer_dict:
                  payload_kind, risk_level, payload = _insufficient(qref)
              elif qref == "leg_pain_v1":
                  payload_kind, risk_level, payload = _interpret_leg_pain(answer_dict, qref)
              elif qref == "back_pain_v1":
                  payload_kind, risk_level, payload = _interpret_back_pain(answer_dict, qref)
              elif qref == "joint_pain_v1":
                  payload_kind, risk_level, payload = _interpret_joint_pain(answer_dict, qref)
              else:
                  payload_kind, risk_level, payload = _interpret_general(answer_dict, qref)

              return {
                  "payload_json": json.dumps(payload, ensure_ascii=False),
                  "payload_kind": payload_kind,
                  "risk_level": risk_level,
              }
