                      {"id": "duration", "text": "持续多久了?", "type": "single", "options": [{"key": "lt_3d", "label": "3 天内"}, {"key": "lt_2w", "label": "2 周内"}, {"key": "gt_2w", "label": "2 周以上"}]},
