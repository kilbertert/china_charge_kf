    - data:
        context:
          enabled: false
          variable_selector: []
        desc: LLM 语义理解:基于 input_text 和 image 上下文判断 scene (report/symptom/product)
        model:
          completion_params:
            max_tokens: 256
            temperature: 0
            top_p: 1
          mode: chat
          name: Doubao-Seed-2.0-lite
          provider: langgenius/volcengine_maas/volcengine_maas
        prompt_template:
        - id: sys-scene-classify
          role: system
          text: |-
            你是健康咨询工作流的场景分流器,只负责判断当前用户输入属于哪个 scene,不要做后续方案判断。

            你必须只在以下三个场景中选择一个:
            1. report: 用户在提供、上传、粘贴、解读、分析某份体检/检查/化验/影像/骨密度报告
            2. symptom: 用户在描述自己当前的不适、疼痛、异常感觉、健康担忧,希望得到分诊或下一步建议
            3. product: 用户在咨询健康产品/营养补充剂/保健品的成分、用法、适用人群、对比、价格、注意事项

            规则:
            - 只判断当前轮主意图,不要根据下游问卷或既往流程状态补全场景
            - 用户上传图片但几乎没有文字时,如果更像报告/检查单,优先判 report
            - 既问症状又问产品时,按用户当前最主要诉求分类
            - 无法明确判断时,优先 symptom,但 confidence 要低

            输出必须是 JSON,不要输出 markdown:
            {"scene":"report|symptom|product","confidence":0.0,"reasoning":"一句话依据"}
        - id: user-scene-classify
          role: user
          text: '{{#4001.input_text#}}'
        selected: false
        title: scene_classifier_LLM
        type: llm
        vision:
          configs:
            detail: low
            variable_selector:
            - '4001'
            - input_image
          enabled: true
      height: 132
      id: '4080'
      position:
        x: 160
        y: 200
      positionAbsolute:
        x: 160
        y: 200
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 242
    - data:
        code: |-
          import json
          import re

          ALLOWED_SCENES = {"report", "symptom", "product"}
          def _parse_json(text):
              raw = (text or "").strip()
              if not raw:
                  return {}
              try:
                  if raw.startswith("{"):
                      return json.loads(raw)
              except Exception:
                  pass
              match = re.search(r"\{[\s\S]*\}", raw)
              if match:
                  try:
                      return json.loads(match.group(0))
                  except Exception:
                      return {}
              return {}


          def main(llm_text: str, text: str, has_image: bool, answers: str) -> dict:
              raw_text = (text or "").strip()
              data = _parse_json(llm_text)
              scene = str(data.get("scene", "")).strip().lower()
              confidence = data.get("confidence", 0.0)
              try:
                  confidence = float(confidence)
              except Exception:
                  confidence = 0.0
              confidence = max(0.0, min(1.0, confidence))

              if scene in ALLOWED_SCENES:
                  return {"scene": scene, "scene_confidence": confidence}

              if has_image and not raw_text:
                  return {"scene": "report", "scene_confidence": 0.6}
              if not raw_text and not has_image:
                  return {"scene": "symptom", "scene_confidence": 0.2}

              # 安全兜底: 无法判断时只返回默认场景,不在这里做任何病因/量表决策。
              return {"scene": "symptom", "scene_confidence": 0.35}
        desc: 只负责 scene 分流,不读取问卷答案做下游决策
        code_language: python3
        outputs:
          scene:
            type: string
            children: null
          scene_confidence:
            type: number
            children: null
        selected: false
        title: scene_classifier_v2
        type: code
        variables:
        - value_selector:
          - '4080'
          - text
          variable: llm_text
        - value_selector:
          - '4001'
          - input_text
          variable: text
        - value_selector:
          - '4001'
          - input_image
          variable: has_image
        - value_selector:
          - '4001'
          - input_answers
          variable: answers
      height: 92
      id: '4002'
      position:
        x: 320
        y: 200
      positionAbsolute:
        x: 320
        y: 200
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 242
    - data:
        cases:
        - case_id: report
          conditions:
          - comparison_operator: is
            id: cond-report
            value: report
            varType: string
            variable_selector:
            - '4002'
            - scene
          id: report
          logical_operator: and
        - case_id: symptom
          conditions:
          - comparison_operator: is
            id: cond-symptom
            value: symptom
            varType: string
            variable_selector:
            - '4002'
            - scene
          id: symptom
          logical_operator: and
        - case_id: product
          conditions:
          - comparison_operator: is
            id: cond-product
            value: product
            varType: string
            variable_selector:
            - '4002'
            - scene
          id: product
          logical_operator: and
        desc: 按 scene 分流到三场景
        logical_operator: and
        selected: false
        title: 路由-按scene
        type: if-else
      height: 168
      id: '4003'
      position:
        x: 640
        y: 200
      positionAbsolute:
        x: 640
        y: 200
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 242
    - data:
        context:
          enabled: false
          variable_selector: []
        desc: 从文本/图片提取骨密度指标,输出 JSON
        model:
          completion_params:
            max_tokens: 2048
            temperature: 0.2
            top_p: 1
          mode: chat
          name: Doubao-Seed-2.0-lite
          provider: langgenius/volcengine_maas/volcengine_maas
        prompt_template:
        - id: sys-scene1
          role: system
          text: "你是销售小程序 AI 健康初筛助手,负责解析客户上传/粘贴的骨密度(DXA)报告内容。\n\n# 你的边界\n- 只做指标提取和风险初筛。\n\
            - 不做疾病诊断、不开药、不承诺疗效、不推荐产品。\n- 输出语言: {{#4001.input_language#}},默认简体中文。\n\
            \n# 严禁行为(违反任意一条 = 整段输出作废,必须返回 dataComplete: false)\n- 严禁编造任何医学指标数值。客户没明确给出的指标,不要写进\
            \ metrics。\n- 严禁从图片的\"任何数字\"(页码、日期、表格背景、UI 文字)臆造 T 值或骨密度值。\n- 严禁编造 oneLineConclusion\
            \ 的具体数值(如\"骨密度下降 X%\")。\n- 严禁在 problemPriority 中虚构风险方向(如\"维生素D不足\"\"尿酸偏高\"\
            ——客户没提供数据就不要写)。\n- 如果客户输入里没有出现可识别的骨密度指标数值,必须返回 metrics: [] 和 dataComplete:\
            \ false,不能强行编造。\n\n# 图片识别规则(关键!)\n- 客户上传的图片必须是清晰可辨的骨密度 DXA 检测报告,包含明确的检测项目名称(如\"\
            腰椎 L1-L4 T值\"\"股骨颈 T值\")和具体数值。\n- 如果图片是:\n  * 与医疗无关的内容(UI 设计图、风景照、聊天截图、文档封面等)\n\
            \  * 模糊、字迹不清、关键数值不可辨认\n  * 体检报告封面而非正文(无 T 值、Z 值等数据)\n  * 其他非 DXA 报告(化验单、超声报告、CT\
            \ 报告等)\n  则必须返回 dataComplete: false,metrics: [],不要试图从图片里\"猜\"出 T 值。\n\
            - 永远不要\"宁可错杀不要放过\"——识别不出就是识别不出,空着比瞎猜好。\n\n# 文本识别规则(同样关键!)\n- 客户文本中必须出现具体的\
            \ T 值数字(如\"-2.1\"\"-0.8\"),才能写入 metrics。\n- 仅出现\"医生说 T 值不正常\"\"骨质疏松\"\"\
            骨量减少\"等描述性词语而**没有具体数字**,不算有数据。\n- 仅出现\"腰椎\"\"股骨颈\"等部位名称而**没有数值**,也不算有数据。\n\
            - 仅出现\"DXA 报告\"\"骨密度报告\"等关键词而**没有具体 T 值数字**,不算有数据。\n- 在以上\"无数字\"场景下,必须返回\
            \ dataComplete: false,metrics: []。\n\n# 必须以 JSON 输出(只输出 JSON,不要 markdown\
            \ 包裹、不要解释文字)\n输出 schema:\n{\n  \"confidence\": \"high\" | \"medium\" |\
            \ \"low\",  // ← 必须填写,你对自己识别的把握程度\n  \"dataComplete\": true | false, \
            \ // ← 仅当 confidence=high 且 metrics 非空时才填 true\n  \"metrics\": [\n   \
            \ {\"name\": \"腰椎 L1-L4 T值\", \"value\": -2.1, \"unit\": \"\"}\n  ],\n\
            \  \"oneLineConclusion\": \"...\",\n  \"problemPriority\": [\n    {\"\
            rank\": 1, \"name\": \"骨密度下降\", \"level\": \"中高\"}\n  ]\n}\n\n# confidence\
            \ 自我评估规则\n- confidence=high: 我**亲眼在客户输入的文字/图片中看到了**具体的 DXA 报告项目和数字(如\"\
            腰椎 L1-L4 T值 -2.1\")。可以放心填 dataComplete=true。\n- confidence=medium: 我看到了部分相关词(如\"\
            骨密度\"\"DXA\"),但**没有看到具体数值**。此时必须填 dataComplete=false,metrics=[]。\n- confidence=low:\
            \ 输入与骨密度报告完全无关(其他类型报告、设计图、聊天截图、症状描述等),或内容模糊不清。**必须填 dataComplete=false,metrics=[]。**\n\
            \n**绝对禁止**:在 confidence≠high 时填 dataComplete=true(代码节点会拦截)。如果你想填 true,必须先证明\
            \ confidence=high。\n\n# 提取规则\n- 常见指标: 腰椎 L1-L4 T值、股骨颈 T值、全髋 T值、25-OH 维生素\
            \ D、血钙。\n- 文本/图片缺失的指标不要写,只输出实际识别到的项。\n- value 必须是数字;若客户写\"阴性/阳性\"等非数值,不要放进\
            \ metrics。\n- T 值的合理范围: 一般在 -5.0 ~ +3.0 之间。如果识别出的\"数值\"明显异常(如大于 5 或小于\
            \ -10),请再次确认——很可能是误识。\n- oneLineConclusion 必须包含\"建议咨询医生/不能替代医生\"等措辞。\n\
            - problemPriority 仅基于实际识别到的指标给出 1-3 条(仅在 dataComplete=true 时)。\n\n# 跟进问题生成(场景一专属!)\n\
            基于已识别的 metrics(且 confidence=high),生成 3-5 个对客户最有帮助的跟进问题,\n用来判断客户骨量下降的原因。**这些问题必须\
            \ 100% 上下文相关,不能套用固定模板。**\n\n## 规则\n- **第一题必须是关于年龄/性别**(通用筛选)。不是 menopause。\n\
            - **跳过 menopause 问题** 当以下任一条件满足:\n  - 客户输入文本中明确显示是男性(如\"我老公\"\"我爸\"\"\
            我儿子\")\n  - 客户年龄明确< 40(从报告头/客户文本可推断)\n  - T 值全部正常(> -1.0),不需要问激素相关\n-\
            \ **跳过已通过 metrics 知道的信息**:\n  - 报告里已有 25-OH 维生素 D → 不问\"您有检查过维生素 D 吗?\"\
            \n  - 报告里 T 值都在 -1.0 以上 → 可以问更开放的问题,如饮食/运动\n- **不要问客户没数据能回答的问题**(如\"您的具体\
            \ T 值是多少\"——metrics 已经有了)\n- **避免堆叠陷阱**:不要连续问 3 个 yes/no,每题给 2-4 个选项\n\
            \n## 输出 schema(追加)\n{\n  \"followUpQuestions\": [\n    { \"id\": \"age_range\"\
