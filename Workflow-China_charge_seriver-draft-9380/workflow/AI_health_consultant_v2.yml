                  "payloadKind": "insufficient_data",
                  "payload": payload,
              }
              return {"output": json.dumps(response, ensure_ascii=False)}


          def main(classify_text):
              try:
                  cls = json.loads(classify_text) if classify_text else {}
              except Exception:
                  cls = {}
              if not isinstance(cls, dict):
                  cls = {}

              tag = str(cls.get("tag", "")).strip()
              confidence = cls.get("confidence", 0.0)
              try:
                  confidence = float(confidence)
              except Exception:
                  confidence = 0.0
              reasoning = str(cls.get("reasoning", "")).strip()
              missing_evidence = cls.get("missingEvidence") if isinstance(cls.get("missingEvidence"), list) else []

              if tag == "insufficient_data" or tag not in SOLUTIONS or confidence < 0.7:
                  return _insufficient(reasoning, missing_evidence)

              solution = SOLUTIONS[tag]
              risk = str(cls.get("risk_level", "")).strip().lower()
              if risk not in ("low", "medium", "high"):
                  risk = solution["riskLevel"]

              payload = {
