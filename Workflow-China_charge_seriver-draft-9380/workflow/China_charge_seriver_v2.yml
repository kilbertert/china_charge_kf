    - id: '5004'
      data:
        type: llm
        title: LLM unclear (引导)
        model: *id002
        prompt_template:
        - role: system
          text: '你是充电桩智能客服,用户输入模糊或太短。


            **核心规则**:

            1. **严格只输出最终答案文本,不要任何<think>推理过程**

            2. 礼貌引导用户选择 4 类方向

            3. 如果 class_name 不是 ''path_e_unclear'',严格只输出:NOT_MY_PATH


            用户问: {{#5001.input_text#}}

            意图分类: {{#5003.class_name#}}'
        - role: user
          text: '{{#5001.input_text#}}'
        context:
          enabled: false
          variable_selector: []
        vision:
          enabled: false
        reasoning_format: separated
      position: &id010
        x: 700
        y: 380
      positionAbsolute: *id010
      width: 280
      height: 130
    - id: '5098'
      data:
        type: code
        title: code_选择最优答案
        code: "\ndef main(text_a, text_b, text_c, text_d, text_e):\n    for t in [text_a,\
          \ text_b, text_c, text_d, text_e]:\n        if t and t.strip() and t.strip()\
          \ != \"NOT_MY_PATH\":\n            return {\"text\": t}\n    return {\"\
          text\": \"抱歉,我没理解您的问题。请问您想咨询:1)功能位置 2)业务规则 3)流程问题 4)Bug反馈?\"}\n"
        code_language: python3
        variables:
        - variable: text_a
          value_selector:
          - '5011'
          - text
        - variable: text_b
          value_selector:
          - '5021'
          - text
        - variable: text_c
          value_selector:
          - '5031'
          - text
        - variable: text_d
          value_selector:
          - '5041'
          - text
        - variable: text_e
          value_selector:
          - '5004'
          - text
        outputs:
          text:
            type: string
            children: null
      position: &id011
        x: 1200
        y: 0
      positionAbsolute: *id011
      width: 280
      height: 130
    - id: '5099'
      data:
        type: end
        title: 输出 AI 回答
        outputs:
        - variable: text
          value_selector:
          - '5098'
          - text
          value_type: string
      position:
        x: 1700
        y: 0
      positionAbsolute:
        x: 1700
        y: 0
      width: 244
      height: 80
