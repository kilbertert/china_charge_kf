    menopause_related: medium
    vitamin_d_deficient: medium
    calcium_protein_deficient: low
    exercise_deficient: low
    medication_related: high
    fracture_high_risk: high
  leg_pain:
    muscle_strain: low
    knee_degeneration: medium
