services:
  backend:
    env_file:
      - ./backend/.env
    build:
      context: ./backend
    container_name: china-charge-backend
    environment:
      PORT: 8011
    ports:
      - "8011:8011"
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8011/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
    container_name: china-charge-frontend
    depends_on:
      backend-dify:
        condition: service_healthy
    ports:
      - "8082:80"
    restart: unless-stopped

  # Dify chatflow 后端 (H5 充电客服 /chat/api, 端口 8012)
  # 单一后端: 替代原宿主 uvicorn + Dify compose backend-dify-internal 双部署
  backend-dify:
    env_file:
      - ./backend/.env.dify
    build:
      context: ./backend
      dockerfile: Dockerfile.dify
    container_name: china-charge-backend-dify
    environment:
      PORT: 8012
    ports:
      - "127.0.0.1:8012:8012"
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8012/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - default
      - dify_default

  backend-health-consult:
    env_file:
      - ./backend/.env.dify-consult
    build:
      context: ./backend
      dockerfile: health_consult/Dockerfile
    container_name: china-charge-backend-health-consult
    environment:
      PORT: 8013
    ports:
      - "8013:8013"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8013/api/health-consult/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  backend-charge-consult:
    env_file:
      - ./backend/.env.dify-charge
    build:
      context: ./backend
      dockerfile: charge_consult/Dockerfile
    container_name: china-charge-backend-charge-consult
    environment:
      PORT: 8014
    ports:
      - "8014:8014"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8014/api/charge-consult/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  dify_default:
    external: true
    name: docker_default
