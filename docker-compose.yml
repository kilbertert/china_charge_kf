services:
  backend:
    env_file:
      - ./backend/.env
    build:
      context: ./backend
    container_name: china-charge-backend
    environment:
      PORT: 8011
    ports:
      - "8011:8011"
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8011/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
    container_name: china-charge-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8082:80"
    # 如果需要直接访问后端，可以取消下面的注释
    # environment:
    #   - VITE_API_BASE=http://localhost:8011

  # Dify 后端 (与 Coze 后端并列,默认端口 8012 防止冲突)
  # 前端切换方式: 启动时 VITE_API_BASE=http://localhost:8012 重新 build
  backend-dify:
    env_file:
      - ./backend/.env.dify
    build:
      context: ./backend
      dockerfile: Dockerfile.dify
    container_name: china-charge-backend-dify
    environment:
      PORT: 8012
    ports:
      - "8012:8012"
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8012/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # AI 健康咨询模块 (health_consult, 端口 8013)
  # 前端切换方式: VITE_API_BASE=http://localhost:8013 重新 build
  backend-health-consult:
    env_file:
      - ./backend/.env.dify-consult
    build:
      context: ./backend
      dockerfile: health_consult/Dockerfile
    container_name: china-charge-backend-health-consult
    environment:
      PORT: 8013
    ports:
      - "8013:8013"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8013/api/health-consult/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # 可选：使用 watchtower 自动更新容器（生产环境推荐）
  # watchtower:
  #   image: containrrr/watchtower
  #   volumes:
  #     - /var/run/docker.sock:/var/run/docker.sock
  #   command: --interval 3600 --cleanup
  #   depends_on:
  #     - frontend
  #     - backend